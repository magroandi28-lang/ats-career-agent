name: Napi gyujtes (Jooble + EURES)

on:
  schedule:
    - cron: "0 4 * * *"    # minden nap 04:00 UTC = 06:00 magyar idő
  workflow_dispatch:        # kézzel is indítható az Actions fülön

jobs:
  gyujtes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Csomagok telepitese
        run: pip install requests supabase python-dotenv

      - name: Gyujtes futtatasa
        env:
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: python scripts/jooble_gyujto.py

      # EURES (NFSZ-forras) - a Jooble-tol strukturalisan fuggetlen, ingyenes forras
      - name: EURES-HU gyujtes futtatasa
        if: always()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: python scripts/eures_gyujto.py

      # A cimke nelkul maradt hirdetesek potlasa (a friss napi Gemini-kerettel)
      - name: Keszseg-potlo futtatasa
        if: always()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: python scripts/keszseg_potlo.py

      # Ami a Gemini-keretbol kimaradt: szotar-cimkezes (0 Ft, AI nelkul)
      - name: Szotar-cimkezo futtatasa
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: python scripts/keszseg_szotaras.py

      # Adatminoseg-jelentes minden nap — az Actions naplojaban olvashato
      - name: Adator (adatminoseg-jelentes)
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: python scripts/adat_or.py
