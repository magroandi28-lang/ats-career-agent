name: Napi gyujtes (Jooble + EURES)

on:
  schedule:
    - cron: "0 4 * * *"    # minden nap 04:00 UTC = 06:00 magyar idő
  workflow_dispatch:        # kézzel is indítható az Actions fülön

jobs:
  gyujtes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Csomagok telepitese
        run: pip install requests supabase python-dotenv

      - name: Gyujtes futtatasa
        env:
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
          GEMINI_KINYERES_GYUJTESKOR: "0"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: python scripts/jooble_gyujto.py

      # EURES (NFSZ-forras) - a Jooble-tol fuggetlen, ingyenes forras
      - name: EURES-HU gyujtes futtatasa
        if: always()
        env:
          GEMINI_KINYERES_GYUJTESKOR: "0"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: python scripts/eures_gyujto.py

      # Eloszor az ingyenes szotar dolgozik.
      - name: Szotar-cimkezo futtatasa (Gemini elott)
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: python scripts/keszseg_szotaras.py

      # A maradek potlasa korlatozott Gemini-keretbol.
      - name: Keszseg-potlo futtatasa
        if: always()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          KESZSEG_POTLO_MAX_CSOMAG: ${{ vars.KESZSEG_POTLO_MAX_CSOMAG || '5' }}
          KESZSEG_POTLO_CSOMAG_MERET: ${{ vars.KESZSEG_POTLO_CSOMAG_MERET || '10' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: python scripts/keszseg_potlo.py

      # Az új készségekkel ismét ingyen címkézünk.
      - name: Szotar-cimkezo ujrafuttatasa
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: python scripts/keszseg_szotaras.py

      # Napi adatminoseg-jelentes.
      - name: Adator (adatminoseg-jelentes)
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: python scripts/adat_or.py
