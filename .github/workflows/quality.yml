name: Quality

on:
  pull_request:
  push:
    branches:
      - main
      - agent/**

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12.13"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install backend dependencies
        run: python -m pip install --requirement backend/requirements-dev.txt
      - name: Audit backend dependencies
        run: python -m pip_audit --requirement backend/requirements.txt
      - name: Scan tracked files for secrets
        run: python scripts/security_scan.py
      - name: Run backend tests
        run: python -m pytest backend

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_only
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Audit frontend dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: Build frontend
        run: npm run build
